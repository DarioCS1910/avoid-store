<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ΛVØID — Checkout</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Arial',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh}
    header{display:flex;justify-content:space-between;align-items:center;padding:20px 40px;border-bottom:1px solid #222}
    .logo{font-size:1.5rem;font-weight:900;letter-spacing:4px;text-decoration:none;color:#fff}
    main{max-width:900px;margin:40px auto;padding:0 20px}
    h1{font-size:2rem;margin-bottom:30px;letter-spacing:2px}
    .checkout-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px}
    .form-section h2,.summary-section h2{font-size:1.1rem;letter-spacing:2px;margin-bottom:20px;border-bottom:1px solid #333;padding-bottom:10px}
    .form-group{margin-bottom:16px}
    .form-group label{display:block;font-size:.8rem;letter-spacing:1px;margin-bottom:6px;color:#aaa}
    .form-group input,.form-group select{width:100%;padding:12px;background:#111;border:1px solid #333;color:#fff;font-size:.95rem;border-radius:2px}
    .form-group input:focus,.form-group select:focus{outline:none;border-color:#fff}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    #cart-summary{min-height:100px}
    .summary-item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #1a1a1a;font-size:.9rem}
    .summary-item .item-name{color:#ccc}
    .summary-total{display:flex;justify-content:space-between;padding:16px 0;font-size:1.1rem;font-weight:700;margin-top:10px}
    .empty-cart{color:#555;font-size:.9rem;padding:20px 0}
    .btn-place-order{width:100%;padding:16px;background:#fff;color:#000;border:none;font-size:.95rem;font-weight:700;letter-spacing:3px;cursor:pointer;margin-top:20px;text-transform:uppercase}
    .btn-place-order:hover{background:#e0e0e0}
    #order-confirmation{display:none;text-align:center;padding:60px 20px}
    #order-confirmation h2{font-size:2rem;letter-spacing:3px;margin-bottom:16px}
    #order-confirmation p{color:#aaa;margin-bottom:30px}
    .btn-back{display:inline-block;padding:12px 32px;border:1px solid #fff;color:#fff;text-decoration:none;letter-spacing:2px;font-size:.85rem}
    @media(max-width:700px){.checkout-grid{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo">ΛVØID</a>
    <a href="index.html" style="color:#aaa;text-decoration:none;font-size:.85rem;letter-spacing:1px">← BACK TO SHOP</a>
  </header>

  <main>
    <div id="checkout-form-section">
      <h1>CHECKOUT</h1>
      <div class="checkout-grid">
        <div class="form-section">
          <h2>SHIPPING INFORMATION</h2>
          <form id="checkout-form" novalidate>
            <div class="form-row">
              <div class="form-group">
                <label for="first-name">FIRST NAME *</label>
                <input type="text" id="first-name" name="firstName" required>
              </div>
              <div class="form-group">
                <label for="last-name">LAST NAME *</label>
                <input type="text" id="last-name" name="lastName" required>
              </div>
            </div>
            <div class="form-group">
              <label for="email">EMAIL *</label>
              <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
              <label for="address">ADDRESS *</label>
              <input type="text" id="address" name="address" required>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="city">CITY *</label>
                <input type="text" id="city" name="city" required>
              </div>
              <div class="form-group">
                <label for="zip">ZIP CODE *</label>
                <input type="text" id="zip" name="zip" required>
              </div>
            </div>
            <div class="form-group">
              <label for="country">COUNTRY *</label>
              <select id="country" name="country">
                <option value="ES">Spain</option>
                <option value="US">United States</option>
                <option value="UK">United Kingdom</option>
                <option value="FR">France</option>
                <option value="DE">Germany</option>
              </select>
            </div>
            <h2 style="margin-top:30px">PAYMENT</h2>
            <div class="form-group">
              <label for="card-number">CARD NUMBER *</label>
              <input type="text" id="card-number" name="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19">
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="card-expiry">EXPIRY DATE *</label>
                <input type="text" id="card-expiry" name="cardExpiry" placeholder="MM/YY" maxlength="5">
              </div>
              <div class="form-group">
                <label for="card-cvv">CVV *</label>
                <input type="text" id="card-cvv" name="cardCvv" placeholder="123" maxlength="3">
              </div>
            </div>
            <button type="submit" class="btn-place-order" id="place-order-btn">PLACE ORDER</button>
          </form>
        </div>
        <div class="summary-section">
          <h2>ORDER SUMMARY</h2>
          <div id="cart-summary"><p class="empty-cart">Loading cart...</p></div>
          <div class="summary-total">
            <span>TOTAL</span>
            <span id="cart-total">$0.00</span>
          </div>
        </div>
      </div>
    </div>

    <div id="order-confirmation">
      <h2>ORDER CONFIRMED</h2>
      <p>Thank you for your purchase. You will receive a confirmation email shortly.</p>
      <a href="index.html" class="btn-back">CONTINUE SHOPPING</a>
    </div>
  </main>

  <script src="products.js"></script>
  <script src="cart.js"></script>
  <script>
    function renderSummary() {
      var items = loadCart();
      var summary = document.getElementById('cart-summary');
      var totalEl = document.getElementById('cart-total');
      if (!items || items.length === 0) {
        summary.innerHTML = '<p class="empty-cart">Your cart is empty.</p>';
        totalEl.textContent = '$0.00';
        return;
      }
      var html = '';
      var total = 0;
      items.forEach(function(item) {
        var subtotal = item.price * item.qty;
        total += subtotal;
        html += '<div class="summary-item"><span class="item-name">' + item.name + ' x' + item.qty + '</span><span>$' + subtotal.toFixed(2) + '</span></div>';
      });
      summary.innerHTML = html;
      totalEl.textContent = '$' + total.toFixed(2);
    }

    document.getElementById('checkout-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var items = loadCart();
      if (!items || items.length === 0) {
        alert('Your cart is empty!');
        return;
      }
      saveCart([]);
      document.getElementById('checkout-form-section').style.display = 'none';
      document.getElementById('order-confirmation').style.display = 'block';
    });

    renderSummary();
  </script>
</body>
</html>

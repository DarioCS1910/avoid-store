<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ΛVØID — Collection</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Arial',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh}
    header{display:flex;justify-content:space-between;align-items:center;padding:20px 40px;border-bottom:1px solid #222}
    .logo{font-size:1.5rem;font-weight:900;letter-spacing:4px;text-decoration:none;color:#fff}
    .cart-btn{background:none;border:1px solid #fff;color:#fff;padding:8px 18px;cursor:pointer;font-size:.85rem;letter-spacing:2px}
    .hero{text-align:center;padding:80px 20px 60px}
    .hero h1{font-size:3.5rem;font-weight:900;letter-spacing:8px;margin-bottom:16px}
    .hero p{color:#555;font-size:.9rem;letter-spacing:3px;text-transform:uppercase}
    .filters{display:flex;justify-content:center;gap:12px;padding:20px;flex-wrap:wrap}
    .filter-btn{padding:8px 20px;border:1px solid #333;background:none;color:#aaa;cursor:pointer;font-size:.8rem;letter-spacing:2px;text-transform:uppercase}
    .filter-btn.active,.filter-btn:hover{border-color:#fff;color:#fff}
    .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:2px;padding:2px 20px 60px}
    .product-card{background:#0f0f0f;cursor:pointer;transition:transform .2s}
    .product-card:hover{transform:scale(1.02)}
    .product-card-img{width:100%;aspect-ratio:3/4;background:#111;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .product-card-img img{width:100%;height:100%;object-fit:cover}
    .product-card-img .ph{color:#222;font-size:1.5rem;letter-spacing:3px}
    .product-card-info{padding:16px}
    .product-card-name{font-size:.85rem;letter-spacing:2px;margin-bottom:6px}
    .product-card-price{font-size:.9rem;color:#888}
    footer{border-top:1px solid #111;padding:30px 40px;text-align:center;color:#333;font-size:.75rem;letter-spacing:2px}
    @media(max-width:600px){.hero h1{font-size:2.2rem}.products-grid{grid-template-columns:repeat(2,1fr)}header{padding:16px 20px}}
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo">ΛVØID</a>
    <button class="cart-btn" id="cart-btn" onclick="location.href='checkout.html'">CART (<span id="cart-count">0</span>)</button>
  </header>

  <div class="hero">
    <h1>ΛVØID</h1>
    <p>DROP 001 — LIMITED COLLECTION</p>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">ALL</button>
    <button class="filter-btn" data-filter="tees">TEES</button>
    <button class="filter-btn" data-filter="hoodies">HOODIES</button>
    <button class="filter-btn" data-filter="pants">PANTS</button>
    <button class="filter-btn" data-filter="accessories">ACCESSORIES</button>
  </div>

  <div class="products-grid" id="products-grid"></div>

  <footer>ΛVØID &copy; 2025 — ALL RIGHTS RESERVED</footer>

  <script src="products.js"></script>
  <script src="cart.js"></script>
  <script>
    var currentFilter = 'all';

    function updateCartCount() {
      var items = loadCart();
      var count = items.reduce(function(acc, i) { return acc + i.qty; }, 0);
      document.getElementById('cart-count').textContent = count;
    }

    function renderProducts(filter) {
      var grid = document.getElementById('products-grid');
      var products = window.WF_PRODUCTS || [];
      var filtered = filter === 'all' ? products : products.filter(function(p) { return p.category === filter; });
      grid.innerHTML = '';
      filtered.forEach(function(product) {
        var card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = '<div class="product-card-img">' +
          (product.img ? '<img src="' + product.img + '" alt="' + product.name + '" onerror="this.parentElement.innerHTML=\'<span class=ph>ΛVØID</span>\'">' : '<span class="ph">ΛVØID</span>') +
          '</div><div class="product-card-info"><div class="product-card-name">' + product.name + '</div><div class="product-card-price">$' + product.price.toFixed(2) + '</div></div>';
        card.addEventListener('click', function() {
          location.href = 'product.html?id=' + product.id;
        });
        grid.appendChild(card);
      });
    }

    document.querySelectorAll('.filter-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        currentFilter = btn.getAttribute('data-filter');
        renderProducts(currentFilter);
      });
    });

    renderProducts('all');
    updateCartCount();
  </script>
</body>
</html>
